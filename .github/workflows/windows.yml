name: windows

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    # Windows parity job: build + unit tests + the Rust-native e2e
    # smoke suite. BATS is bash-only and stays on Buildkite's Unix
    # jobs. GitHub-hosted `windows-latest` runners do NOT have
    # Developer Mode enabled, but the linker uses NTFS junctions
    # (`junction::create`) for directory links rather than real
    # symlinks, so the install pipeline works without admin or
    # Developer Mode, matching pnpm's approach.
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
